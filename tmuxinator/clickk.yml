# /Users/alffenton/.config/tmuxinator/clickk.yml
name: clickk
root: ~/Clickk
tmux_options: -f ~/.config/tmux/.tmux.conf
windows:
  - frontend:
      root: ~/Clickk/frontend/
      panes:
        - nvim .
  - user-service:
      root: ~/Clickk/backend/user_service/
      panes:
        - nvim .
  - content-offer-service:
      root: ~/Clickk/backend/content_offer_service/
      panes:
        - nvim .
  - engagement_service:
      root: ~/Clickk/backend/engagement_service/
      panes:
        - nvim .
  - osint_service:
      root: ~/Clickk/backend/osint_service/
      panes:
        - nvim .
  - kinesis_lambda:
      root: ~/Clickk/backend/kinesis_lambda/
      panes:
        - nvim .
  - common:
      root: ~/Clickk/backend/common/
      panes:
        - nvim .
  - iac:
      root: ~/Clickk/
      panes:
        - nvim prod-k8s/ charts/ terraform/
  - docker:
      root: ~/Clickk/
      panes:
        - nvim docker-compose.yaml
        - open -a Docker && docker compose --profile full --profile extended up --build
